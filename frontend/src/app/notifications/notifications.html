<div class="container py-4">

    <h3 class="mb-3">Notifications</h3>
  
    <!-- Loading -->
    <div *ngIf="loading()" class="text-center text-muted">
      Loading notifications...
    </div>
  
    <!-- Notifications list -->
    <div
      *ngFor="let n of notifications()"
      class="card mb-2 p-3 d-flex flex-row justify-content-between align-items-center"
      [class.unread]="!n.read"
    >
  
      <div>
  
        <div>
          {{ n.message }}
        </div>
  
        <div class="text-muted small">
          {{ n.createdAt | date:'short' }}
        </div>
  
      </div>
  
      <div>
  
        <!-- Mark read -->
        <button
          *ngIf="!n.read"
          class="btn btn-sm btn-primary me-1"
          (click)="markAsRead(n)"
        >
          Mark read
        </button>
  
        <!-- Delete -->
        <button
          class="btn btn-sm btn-danger"
          (click)="deleteNotification(n)"
        >
          Delete
        </button>
  
      </div>
  
    </div>
  
    <!-- Empty -->
    <div
      *ngIf="!loading() && notifications().length === 0"
      class="text-center text-muted"
    >
      No notifications
    </div>
  
  </div>
