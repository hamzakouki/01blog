<div class="container mt-4">

  <!-- ✍️ CREATE POST -->
  <div class="card shadow-sm mb-4 p-3">

    <textarea
      class="form-control mb-2"
      placeholder="Share something..."
      [(ngModel)]="newPostContent"
      rows="3">
    </textarea>

    <input type="file"
           (change)="onFileChange($event)"
           class="form-control mb-2" />

    <button class="btn btn-primary"
            (click)="createPost()"
            [disabled]="loadingPost">

      {{ loadingPost ? 'Posting...' : 'Post' }}

    </button>

  </div>


  <!-- 📰 POSTS FEED -->
  <div *ngFor="let post of posts()" class="card mb-3 shadow-sm">

    <div class="card-body">

      <!-- 👤 AUTHOR -->
      <div class="mb-2">
        <a class="fw-bold text-decoration-none"
           [routerLink]="['/users', post.authorId]">

          {{ post.authorUsername }}

        </a>

        <small class="text-muted ms-2">
          {{ post.createdAt | date:'short' }}
        </small>
      </div>

      <!-- CONTENT -->
      <p>{{ post.content }}</p>

      <!-- MEDIA -->
      <div *ngIf="post.mediaUrl">

        <img *ngIf="post.mediaUrl.includes('image')"
             [src]="post.mediaUrl"
             class="img-fluid rounded mb-2" />

        <video *ngIf="post.mediaUrl.includes('video')"
               [src]="post.mediaUrl"
               controls
               class="w-100 rounded mb-2">
        </video>

      </div>

      <!-- STATS -->
      <div class="mb-2">
        👍 {{ post.likeCount }} | 💬 {{ post.commentCount }}
      </div>

      <!-- ACTIONS -->
      <div class="mb-2">
        <button class="btn btn-sm btn-outline-primary me-2"
                (click)="toggleLike(post)">
          Like
        </button>

        <button class="btn btn-sm btn-outline-secondary"
                (click)="toggleComments(post)">
          Comment
        </button>
      </div>

      <!-- COMMENTS -->
      <div *ngIf="post.showComments">

        <div *ngFor="let comment of post.comments" class="mb-2">
          <strong>{{ comment.authorUsername }}</strong>
          <small class="text-muted ms-1">
            {{ comment.createdAt | date:'short' }}
          </small>

          <div>{{ comment.content }}</div>
        </div>

        <!-- ADD COMMENT -->
        <div class="d-flex mt-2">
          <input
            type="text"
            class="form-control me-2"
            [(ngModel)]="post.newComment"
            placeholder="Write a comment..." />

          <button class="btn btn-primary btn-sm"
                  (click)="addComment(post)">
            Send
          </button>
        </div>

      </div>

    </div>

  </div>

</div>
